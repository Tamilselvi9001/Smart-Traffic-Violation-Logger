{% extends 'base.html' %}
{% block title %}Officer Login{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card fade-up">
    <div class="text-center">
      <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h1 class="login-title">Officer Access</h1>
      <p class="login-sub">Sign in to the TrafficLog control panel</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" data-loading>
      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="input-with-icon">
          <i class="input-icon fa fa-user"></i>
          <input type="text" name="username" class="field-input" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-with-icon">
          <i class="input-icon fa fa-lock"></i>
          <input type="password" name="password" class="field-input" placeholder="Enter password" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="login-btn mt-2">
        <i class="fa fa-right-to-bracket me-2"></i> Login to Dashboard
      </button>
    </form>
    <p class="login-hint">
      Default credentials: <code>admin</code> / <code>admin123</code>
    </p>
    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" style="color: var(--muted); font-size: 13px; text-decoration: none;">
        <i class="fa fa-arrow-left me-1"></i> Back to home
      </a>
    </div>
  </div>
</div>
{% endblock %}
