{% extends 'base.html' %}
{% block title %}Log Violation{% endblock %}

{% block content %}
<div class="container main-content">
  <div class="page-header">
    <h1 class="page-title"><span>Log</span> New Violation</h1>
    <a href="{{ url_for('dashboard') }}" class="btn-outline-amber" style="padding: 9px 18px; font-size: 13px;">
      <i class="fa fa-arrow-left"></i> Dashboard
    </a>
  </div>

  <div class="row g-4">
    <!-- Form -->
    <div class="col-lg-7">
      <div class="card">
        <div class="card-body">
          <div class="form-section-title">
            <i class="fa fa-pen-to-square"></i> Violation Details
          </div>
          <form method="POST" action="{{ url_for('add_violation') }}" data-loading>
            <div class="row g-3">
              <div class="col-12">
                <div class="field-group">
                  <label class="field-label">Vehicle Number *</label>
                  <div class="input-with-icon">
                    <i class="input-icon fa fa-car"></i>
                    <input type="text" id="vehicle_number" name="vehicle_number"
                           class="field-input" placeholder="e.g. TN01AB1234"
                           style="text-transform: uppercase;" required>
                  </div>
                </div>
              </div>
              <div class="col-12">
                <div class="field-group">
                  <label class="field-label">Violation Type *</label>
                  <select id="violation_type" name="violation_type" class="field-input" required>
                    <option value="">— Select Violation —</option>
                    {% for vtype in violation_types %}
                    <option value="{{ vtype }}">{{ vtype }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="col-12">
                <div class="field-group">
                  <label class="field-label">Location *</label>
                  <div class="input-with-icon">
                    <i class="input-icon fa fa-location-dot"></i>
                    <input type="text" id="location" name="location"
                           class="field-input" placeholder="e.g. Anna Salai, Chennai" required>
                  </div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="field-group">
                  <label class="field-label">Date of Violation *</label>
                  <input type="date" id="date" name="date" class="field-input"
                         value="{{ today }}" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="field-group has-prefix">
                  <label class="field-label">Fine Amount (INR) *</label>
                  <div class="input-with-icon" style="display: flex;">
                    <span class="input-prefix">₹</span>
                    <input type="number" id="fine_amount" name="fine_amount"
                           class="field-input" placeholder="500"
                           min="0" step="0.01" required style="flex: 1;">
                  </div>
                </div>
              </div>
              <div class="col-12 mt-2">
                <button type="submit" class="btn-amber" style="width: 100%; justify-content: center; padding: 14px;">
                  <i class="fa fa-file-circle-plus me-2"></i> Generate Challan
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="col-lg-5">
      <div class="preview-card">
        <div class="preview-title">
          <i class="fa fa-receipt"></i> Challan Preview
        </div>
        <div class="preview-vehicle" id="prev-vehicle">——</div>
        <div class="preview-row">
          <span class="preview-key">Violation</span>
          <span class="preview-val" id="prev-type">—</span>
        </div>
        <div class="preview-row">
          <span class="preview-key">Location</span>
          <span class="preview-val" id="prev-location" style="font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500;">—</span>
        </div>
        <div class="preview-row">
          <span class="preview-key">Date</span>
          <span class="preview-val" id="prev-date">—</span>
        </div>
        <div class="preview-row">
          <span class="preview-key">Fine Amount</span>
          <span class="preview-fine-amt" id="prev-fine">—</span>
        </div>
        <div class="preview-row">
          <span class="preview-key">Status</span>
          <span class="badge-unpaid"><i class="fa fa-clock"></i> Unpaid</span>
        </div>
        <div style="margin-top: 20px; padding: 14px; background: rgba(245,158,11,0.05); border-radius: 8px; border: 1px dashed rgba(245,158,11,0.2);">
          <div style="font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px;">
            <i class="fa fa-qrcode" style="color: var(--amber);"></i>
            QR code will be auto-generated on submission
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
